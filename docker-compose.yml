services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: atlas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - atlas_pg_data:/var/lib/postgresql/data

  api:
    build: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ATLAS_BOOTSTRAP_ORG_NAME: ${ATLAS_BOOTSTRAP_ORG_NAME:-}
      ATLAS_BOOTSTRAP_ADMIN_EMAIL: ${ATLAS_BOOTSTRAP_ADMIN_EMAIL:-}
      ATLAS_BOOTSTRAP_ADMIN_PASSWORD: ${ATLAS_BOOTSTRAP_ADMIN_PASSWORD:-}
    ports:
      - "8000:8000"
    volumes:
      - atlas_api_data:/app/data
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        # La URL que el NAVEGADOR usará para llamar a la API
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  atlas_pg_data:
  atlas_api_data:
