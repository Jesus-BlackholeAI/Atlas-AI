services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: atlas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - atlas_pg_data:/var/lib/postgresql/data

  api:
    build: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ATLAS_BOOTSTRAP_ORG_NAME: ${ATLAS_BOOTSTRAP_ORG_NAME}
      ATLAS_BOOTSTRAP_ADMIN_EMAIL: ${ATLAS_BOOTSTRAP_ADMIN_EMAIL}
      ATLAS_BOOTSTRAP_ADMIN_PASSWORD: ${ATLAS_BOOTSTRAP_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8000:8000"
    volumes:
      - atlas_api_data:/app/data
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    environment:
      VITE_API_BASE: ${VITE_API_BASE}
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  atlas_pg_data:
  atlas_api_data:
